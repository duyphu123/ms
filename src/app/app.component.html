<div *ngIf="loading" class="app-loading">
  <div
    class="loading-backdrop"
    [style.background-image]="'linear-gradient(to bottom, rgba(0, 0, 0, 0.42), rgba(0, 0, 0, 0.82)), url(assets/cards/back2.jpg)'"
  ></div>
  <div class="loading-panel">
    <div class="loading-title">Dang tai tai nguyen</div>
    <div class="loading-percent">{{ loadingPercent }}%</div>
    <div class="loading-bar">
      <div class="loading-bar-fill" [style.width.%]="loadingPercent"></div>
    </div>
  </div>
</div>

<router-outlet *ngIf="!loading"></router-outlet>
