<div class="wrap">
  <div class="topbar">
    <button class="icon-back" (click)="goBack()" aria-label="Quay lại">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Quay lại</span>
    </button>

    <h2>Rút bài</h2>
  </div>

  <div class="status">
    <div><strong>Tổng còn:</strong> {{ remaining }}</div>
  </div>

  <div class="card-zone">
    <img *ngIf="!revealed" class="card" [src]="backImg" alt="Mặt sau" (click)="onClickBack()" />
    <img *ngIf="revealed" class="card" [src]="revealed.img" [alt]="revealed.name" (error)="onImgError($event)" />
  </div>

  <div class="actions" #actionAnchor>
    <button (click)="hideCurrent()" [disabled]="!revealed">Ẩn bài</button>
  </div>

  <div *ngIf="showDoneModal" class="done-overlay" (click)="closeDoneModal()">
    <div class="done-modal" (click)="$event.stopPropagation()">
      <h3>Đã rút hết bài</h3>
      <div class="done-actions">
        <button type="button" (click)="goBack()">Quay lại</button>
        <button type="button" class="done-history-btn" (click)="goToHistory()">Lịch sử</button>
      </div>
    </div>
  </div>
</div>
